.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 7px; border-radius: 6px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.score-bar { height: 4px; border-radius: 2px; margin-top: 5px; background: var(--color-background-secondary); overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; }
.expand-icon { font-size: 12px; color: var(--color-text-tertiary); transition: transform 0.15s; display: inline-block; }
.data-row.open .expand-icon { transform: rotate(90deg); }
.tl-row { display: none; }
.tl-row.open { display: table-row; }
.tl-cell { padding: 4px 16px 16px 44px !important; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
.tl { padding-left: 14px; border-left: 1.5px solid var(--color-border-secondary); }
.tl-step { position: relative; padding: 0 0 14px 18px; }
.tl-step:last-child { padding-bottom: 0; }
.tl-dot { position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--color-background-secondary); }
.tl-label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.tl-main { font-size: 13px; color: var(--color-text-primary); line-height: 1.4; }
.tl-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; }
.tl-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.last-fresh  { background: var(--color-background-success); color: var(--color-text-success); }

.last-old    { background: var(--color-background-danger);  color: var(--color-text-danger); }
.last-none   { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }

  if (days === null) return { label: 'sin actividad', cls: 'last-none' };
  if (days <= 7)  return { label: 'hace ' + days + 'd', cls: 'last-fresh' };
  if (days <= 30) return { label: 'hace ' + days + 'd', cls: 'last-medium' };
  return { label: 'hace ' + days + 'd', cls: 'last-old' };
}
function ttvInfo(u) {
  if (u.ttv === null) return { label: 'sin actividad', cls: 'b-neutral', cat: 'fantasma' };
  if (u.ttv <= 0) return { label: 'ws previo', cls: 'b-blue', cat: 'inmediato' };
  const h = u.ttv;
  if (h < 24) {
    const m = Math.round(h * 60);
    return { label: m < 60 ? m + ' min' : Math.round(h) + ' hrs', cls: 'b-green', cat: 'inmediato' };
  }
  const d = (h / 24).toFixed(1);
  return h / 24 <= 7
    ? { label: d + ' días', cls: 'b-warn', cat: 'medio' }
    : { label: d + ' días', cls: 'b-red',  cat: 'lento' };
}
function scoreColor(s) {
  if (s === 0) return '#888780';
  if (s < 10)  return '#EF9F27';
  if (s < 50)  return '#378ADD';
  return '#1D9E75';
}
function wsPillHtml(w) {
  if (w.o) return `<span class="ws-pill ws-owner">👑 ${w.n}</span>`;
  if (w.a) return `<span class="ws-pill ws-admin">⚙ ${w.n}</span>`;
  return `<span class="ws-pill ws-member">👤 ${w.n}</span>`;
}

function render() {
  const tbody = document.getElementById('tbody');
  const list = users.filter(u => {
    const ttv = ttvInfo(u);
    return (filter === 'todos' || ttv.cat === filter) &&
           (!search || u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search));
  });
  tbody.innerHTML = '';
  list.forEach(u => {
    const ttv = ttvInfo(u);
    const score = u.acts + u.opps + u.notes;
    const pct = maxScore ? Math.round(score / maxScore * 100) : 0;
    const ld = lastDate(u);
    const lb = lastBadge(ld);

    // main row
    const tr = document.createElement('tr');
    tr.className = 'data-row';
    tr.dataset.uid = u.id;
    tr.innerHTML = `
      <td style="text-align:center;padding-left:12px;"><span class="expand-icon">▶</span></td>
      <td><div class="user-name">${u.name}</div><div class="user-email">${u.email}</div></td>
      <td style="max-width:220px;"><div style="display:flex;flex-wrap:wrap;gap:2px;">${u.ws.length ? u.ws.map(wsPillHtml).join('') : '<span style="font-size:11px;color:var(--color-text-tertiary);">sin workspace</span>'}</div></td>
      <td style="color:var(--color-text-secondary);white-space:nowrap;font-size:12px;">${u.reg}</td>
      <td>${u.fDesc
        ? `<div style="font-size:13px;color:var(--color-text-primary);">${u.fDesc}</div><div style="font-size:11px;color:var(--color-text-tertiary);">${u.fDate} · ${u.fType}</div>`
        : `<span style="color:var(--color-text-tertiary);font-size:12px;">ninguna</span>`}
      </td>
      <td><span class="badge ${ttv.cls}">${ttv.label}</span></td>
      <td style="min-width:110px;">
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          <span class="pill"><span class="pill-dot" style="background:#378ADD"></span>${u.acts}</span>
          <span class="pill"><span class="pill-dot" style="background:#1D9E75"></span>${u.opps}</span>
          <span class="pill"><span class="pill-dot" style="background:#BA7517"></span>${u.notes}</span>
        </div>
        <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${scoreColor(score)};"></div></div>
      </td>
    `;
    tr.onclick = () => toggle(u.id);
    tbody.appendChild(tr);

    // timeline row
    const parts = [
      u.lastAct  ? {label:'última actividad',   d:u.lastAct,  color:'#378ADD'} : null,
      u.lastOpp  ? {label:'última oportunidad', d:u.lastOpp,  color:'#1D9E75'} : null,
      u.lastNote ? {label:'última nota',        d:u.lastNote, color:'#BA7517'} : null,
    ].filter(Boolean).sort((a,b) => b.d.localeCompare(a.d));

    const lastPills = parts.length
      ? parts.map(p => `<span class="pill"><span class="pill-dot" style="background:${p.color}"></span>${p.label}: ${p.d.slice(0,10)}</span>`).join('')
      : `<span style="color:var(--color-text-tertiary);font-size:12px;">sin registros</span>`;

    const wsList = u.ws.length
      ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;">${u.ws.map(wsPillHtml).join('')}</div>`
      : `<span style="color:var(--color-text-tertiary);font-size:12px;">sin workspace asignado</span>`;

    const dotColor = lb.cls === 'last-fresh' ? '#639922' : lb.cls === 'last-medium' ? '#EF9F27' : lb.cls === 'last-old' ? '#E24B4A' : '#888780';

    const tlTr = document.createElement('tr');
    tlTr.className = 'tl-row';
    tlTr.id = 'tl-' + u.id;
    tlTr.innerHTML = `
      <td colspan="7" class="tl-cell">
        <div class="tl">
          <div class="tl-step">
            <div class="tl-dot" style="background:#888780;"></div>
            <div class="tl-label">Registro</div>
            <div class="tl-main">${u.name} se registró el ${u.reg}</div>
            <div class="tl-sub">Workspaces: ${wsList}</div>
          </div>
          ${u.fDesc ? `
          <div class="tl-step">
            <div class="tl-dot" style="background:${u.fType==='actividad'?'#378ADD':'#1D9E75'};"></div>
            <div class="tl-label">Primera acción</div>
            <div class="tl-main">${u.fType === 'actividad' ? '📅' : '💼'} ${u.fDesc}</div>
            <div class="tl-sub">${u.fDate} · ${u.fType}</div>
          </div>` : `
          <div class="tl-step">
            <div class="tl-dot" style="background:#E24B4A;"></div>
            <div class="tl-label">Primera acción</div>
            <div class="tl-main" style="color:var(--color-text-tertiary);">Nunca creó nada en el sistema</div>
          </div>`}
          <div class="tl-step">
            <div class="tl-dot" style="background:#BA7517;"></div>
            <div class="tl-label">Actividad acumulada</div>
            <div class="tl-pills">
              <span class="pill"><span class="pill-dot" style="background:#378ADD"></span>${u.acts} actividades</span>
              <span class="pill"><span class="pill-dot" style="background:#1D9E75"></span>${u.opps} oportunidades</span>
              <span class="pill"><span class="pill-dot" style="background:#BA7517"></span>${u.notes} notas</span>
            </div>
          </div>
          <div class="tl-step" style="padding-bottom:0;">
            <div class="tl-dot" style="background:${dotColor};"></div>
            <div class="tl-label">Última actividad &nbsp;<span class="badge ${lb.cls}">${lb.label}</span></div>
            <div class="tl-pills" style="margin-top:6px;">${lastPills}</div>
          </div>
        </div>
      </td>`;
    tbody.appendChild(tlTr);
  });
}

function toggle(id) {
  const tr = document.querySelector(`tr[data-uid="${id}"]`);
  const tl = document.getElementById('tl-' + id);
  const isOpen = tl.classList.contains('open');
  document.querySelectorAll('.tl-row').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('.data-row').forEach(r => r.classList.remove('open'));
  if (!isOpen) { tl.classList.add('open'); tr.classList.add('open'); }
}
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function doSearch(v) { search = v.toLowerCase(); render(); }
render();
</script>
